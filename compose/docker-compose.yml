services:

  configserver:
    image: diningplate-configserver:${CONFIGSERVER_VERSION}
    container_name: configserver
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8090/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - diningplate-net

  order-service:
    image: order-service:${ORDER_SERVICE_VERSION}
    container_name: order-service
    ports:
      - "8080:8080"
    environment:
      SPRING_CLOUD_CONFIG_URI: http://configserver:8090
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: diningplate
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
    depends_on:
      configserver:
        condition: service_healthy
    networks:
      - diningplate-net

networks:
  diningplate-net:
    external: true
