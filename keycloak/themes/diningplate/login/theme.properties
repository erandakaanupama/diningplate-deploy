# DiningPlate login theme — branding-only extension of the base Keycloak theme.
# Inherits all FreeMarker page templates from `keycloak`; we only layer CSS/branding.
parent=keycloak
import=common/keycloak

# Keep the parent's stylesheet (css/login.css) and append our brand overrides last.
styles=css/login.css css/diningplate.css

locales=en
